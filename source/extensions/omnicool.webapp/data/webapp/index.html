<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Omnicool</title>
    <link href="/static/css/main.12efbfe1.css" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- ── Omnicool USD bridge patch ───────────────────────────────────────
         Opens a direct WebSocket connection to the Kit extension (port 8899),
         exposes window.__omniUsdSend(type, payload) -> Promise, and wires the
         Results Mapping "Start Prim Property Override" button so it actually
         calls the backend (deinstance_and_add_flownex).
    ─────────────────────────────────────────────────────────────────────── -->
    <script>
    (function () {
      var USD_WS_URL = 'ws://127.0.0.1:8899';
      var _ws = null, _msgId = 0, _pending = {};

      function _getWs() {
        if (_ws && (_ws.readyState === 0 || _ws.readyState === 1)) return _ws;
        try { _ws = new WebSocket(USD_WS_URL); } catch (e) { _ws = null; return null; }
        _ws.onmessage = function (evt) {
          var msg; try { msg = JSON.parse(evt.data); } catch (e) { return; }
          var cb = _pending[msg.id];
          if (cb) { delete _pending[msg.id]; msg.ok ? cb.resolve(msg.payload) : cb.reject(new Error(msg.error || 'USD WS error')); }
        };
        _ws.onerror = _ws.onclose = function () { _ws = null; };
        return _ws;
      }

      /** Send a USD WebSocket message. Returns a Promise that resolves with the payload. */
      window.__omniUsdSend = function (type, payload) {
        return new Promise(function (resolve, reject) {
          var sock = _getWs();
          if (!sock) { reject(new Error('USD WS unavailable')); return; }
          var id = String(++_msgId);
          _pending[id] = { resolve: resolve, reject: reject };
          setTimeout(function () {
            if (_pending[id]) { delete _pending[id]; reject(new Error('USD WS timeout')); }
          }, 30000);
          function doSend() {
            try { sock.send(JSON.stringify({ id: id, type: type, payload: payload || {} })); }
            catch (e) { delete _pending[id]; reject(e); }
          }
          if (sock.readyState === 1 /* OPEN */) { doSend(); }
          else if (sock.readyState === 0 /* CONNECTING */) {
            sock.addEventListener('open',  doSend, { once: true });
            sock.addEventListener('error', function () { delete _pending[id]; reject(new Error('USD WS connection failed')); }, { once: true });
          } else { delete _pending[id]; reject(new Error('USD WS closed')); }
        });
      };

      /** Floating toast notification (success = green, error = red). */
      function _showToast(msg, isError) {
        var t = document.getElementById('__omni-rm-toast');
        if (!t) {
          t = document.createElement('div');
          t.id = '__omni-rm-toast';
          t.style.cssText = [
            'position:fixed;bottom:24px;right:24px;z-index:99999',
            'padding:10px 18px;border-radius:6px',
            'font-size:13px;font-family:Segoe UI,system-ui,sans-serif',
            'max-width:480px;word-break:break-word',
            'transition:opacity .4s;pointer-events:none;color:#fff'
          ].join(';');
          document.body.appendChild(t);
        }
        t.textContent = msg;
        t.style.background = isError ? '#b71c1c' : '#1b5e20';
        t.style.opacity = '1';
        clearTimeout(t._tid);
        t._tid = setTimeout(function () { t.style.opacity = '0'; }, 5000);
      }
      /* Expose for use by other script blocks in this page. */
      window.__omniShowToast = _showToast;

      /** Wire a single "Start Prim Property Override" button. */
      function _patchButton(btn) {
        if (btn._omniPatched) return;
        btn._omniPatched = true;
        btn.addEventListener('click', function () {
          /* Read the root-path input that lives in the same .section container. */
          var root = '/World';
          var section = btn.closest ? btn.closest('.section') : null;
          if (section) {
            var inp = section.querySelector('input[type="text"]');
            if (inp) root = inp.value.trim() || '/World';
          }
          var origText = btn.textContent;
          btn.disabled = true;
          btn.textContent = 'Running\u2026';
          window.__omniUsdSend('flownex_tools.deinstance_and_add_flownex', { root: root })
            .then(function (r) {
              btn.textContent = origText;
              btn.disabled = false;
              _showToast('\u2713 ' + (r.summary || 'Done.'), false);
            })
            .catch(function (err) {
              btn.textContent = origText;
              btn.disabled = false;
              _showToast('\u2717 ' + err.message, true);
            });
        });
      }

      /* Watch for the React app to render the Results Mapping button. */
      new MutationObserver(function () {
        var btns = document.querySelectorAll('button');
        for (var i = 0; i < btns.length; i++) {
          if (btns[i].textContent.trim() === 'Start Prim Property Override') {
            _patchButton(btns[i]);
          }
        }
      }).observe(document.documentElement, { childList: true, subtree: true });
    }());
    </script>

    <!-- ── Configuration tab: path persistence + server-side file browser ──
         Problem 1 — Path textboxes reset on tab switch:
           The Configuration component uses local React state that is
           discarded when the component unmounts. This patch persists paths to
           localStorage and restores them every time the inputs re-appear.

         Problem 2 — Browse ("...") button only shows filename:
           The browser blocks access to the full filesystem path for security
           reasons. This patch intercepts the "..." button and sends a
           "config.browse_file" / "config.browse_directory" message to the
           Kit extension, which opens a native OS file dialog and returns the
           full path over the WebSocket.

         Problem 3 — Buttons not functional when bridge disconnects:
           The backend now runs a WS server on port 8001 (bridge_ws_handlers.py).
           Saved paths are also included in every "state" message so the UI can
           restore them after reconnect.
    ─────────────────────────────────────────────────────────────────────── -->
    <script>
    (function () {
      var LS_PROJECT = 'omnicool_projectFile';
      var LS_IODIR   = 'omnicool_ioDirectory';

      /* ── React synthetic-event trick ─────────────────────────────────────
         Setting `input.value = x` alone does not trigger React's onChange.
         We must use the native HTMLInputElement setter and then dispatch an
         input event so React picks up the change and updates its state.    */
      var _nativeSetter = Object.getOwnPropertyDescriptor(
        window.HTMLInputElement.prototype, 'value'
      ).set;

      function _setReactInput(inp, value) {
        _nativeSetter.call(inp, value);
        inp.dispatchEvent(new Event('input', { bubbles: true }));
        inp.dispatchEvent(new Event('change', { bubbles: true }));
      }

      /* ── Pending browse requests ──────────────────────────────────────── */
      var _browseCallbacks = {};   // requestId → { resolve, reject }

      /* ── Forward "browse_result" messages from the bridge WS ─────────── */
      function _hookBridgeWsMessages() {
        /* The React useBridge hook owns the WS connection. We intercept
           messages by wrapping MessageEvent handling via the __bridgeAPI
           `send` function's socket reference — but that's private.
           Instead we listen on window for the `message` event on the
           bridge WS by patching WebSocket itself before the React bundle
           opens its connection.  */
        var OrigWS = window.WebSocket;
        window.WebSocket = function (url, protocols) {
          var ws = protocols ? new OrigWS(url, protocols) : new OrigWS(url);
          if (url === 'ws://127.0.0.1:8001/ws') {
            var origOnMessage = null;
            Object.defineProperty(ws, 'onmessage', {
              get: function () { return origOnMessage; },
              set: function (fn) {
                origOnMessage = function (evt) {
                  /* Intercept and handle our custom message types first. */
                  try {
                    var msg = JSON.parse(evt.data);
                    if (msg.type === 'browse_result') {
                      var cb = _browseCallbacks[msg.payload && msg.payload.requestId];
                      if (cb) {
                        delete _browseCallbacks[msg.payload.requestId];
                        cb.resolve(msg.payload.path || '');
                      }
                      return; /* Do NOT forward to React — it would confuse useBridge */
                    }
                    /* Persist saved paths from the state message */
                    if (msg.type === 'state' && msg.payload) {
                      var sp = msg.payload.savedProjectPath;
                      var si = msg.payload.savedIoDir;
                      if (sp) localStorage.setItem(LS_PROJECT, sp);
                      if (si) localStorage.setItem(LS_IODIR, si);
                      /* Schedule a path restore after React processes this state */
                      setTimeout(_tryRestorePaths, 200);
                    }
                  } catch (e) { /* ignore parse errors */ }
                  if (fn) fn.call(ws, evt);
                };
                Object.defineProperty(ws, 'onmessage', {
                  value: origOnMessage,
                  writable: true,
                  configurable: true
                });
              },
              configurable: true
            });
          }
          return ws;
        };
        window.WebSocket.prototype = OrigWS.prototype;
        window.WebSocket.CONNECTING = OrigWS.CONNECTING;
        window.WebSocket.OPEN       = OrigWS.OPEN;
        window.WebSocket.CLOSING    = OrigWS.CLOSING;
        window.WebSocket.CLOSED     = OrigWS.CLOSED;
      }

      /* ── Request a server-side file/directory dialog ─────────────────── */
      function _serverBrowse(mode, filters) {
        return new Promise(function (resolve, reject) {
          if (!window.__bridgeAPI || !window.__bridgeAPI.send) {
            reject(new Error('Bridge not connected'));
            return;
          }
          var reqId = Math.random().toString(36).slice(2);
          _browseCallbacks[reqId] = { resolve: resolve, reject: reject };
          setTimeout(function () {
            if (_browseCallbacks[reqId]) {
              delete _browseCallbacks[reqId];
              reject(new Error('Browse dialog timed out or was cancelled'));
            }
          }, 120000);
          window.__bridgeAPI.send({
            type: 'config.browse_file',
            id: reqId,
            payload: { mode: mode, filters: filters || [], requestId: reqId }
          });
        });
      }

      /* ── Persist paths when the React app calls configure ────────────── */
      function _patchBridgeAPI() {
        if (!window.__bridgeAPI || window.__bridgeAPI._configPatched) return;
        window.__bridgeAPI._configPatched = true;
        var origConfigure = window.__bridgeAPI.configure;
        window.__bridgeAPI.configure = function (projectPath, ioDir, backend) {
          if (projectPath) localStorage.setItem(LS_PROJECT, projectPath);
          if (ioDir)        localStorage.setItem(LS_IODIR,   ioDir);
          return origConfigure.apply(this, arguments);
        };
      }

      /* ── Restore saved paths to the Configuration tab inputs ─────────── */
      var _populated = new WeakSet();

      function _tryRestorePaths() {
        var savedProject = localStorage.getItem(LS_PROJECT) || '';
        var savedIoDir   = localStorage.getItem(LS_IODIR)   || '';
        if (!savedProject && !savedIoDir) return;

        document.querySelectorAll('input[type="text"]').forEach(function (inp) {
          if (_populated.has(inp)) return;
          var ph = inp.getAttribute('placeholder') || '';
          if (savedProject && ph.indexOf('.proj') !== -1) {
            _populated.add(inp);
            if (!inp.value) _setReactInput(inp, savedProject);
          } else if (savedIoDir && ph.indexOf('IOFiles') !== -1) {
            _populated.add(inp);
            if (!inp.value) _setReactInput(inp, savedIoDir);
          }
        });
      }

      /* ── Intercept "..." browse buttons with server-side dialog ──────── */
      var _browseBtnsPatched = new WeakSet();

      function _patchBrowseButtons() {
        document.querySelectorAll('button').forEach(function (btn) {
          if (_browseBtnsPatched.has(btn)) return;
          if (btn.textContent.trim() !== '...') return;

          /* Determine if this is the project-file or IO-directory button by
             checking the sibling <input> placeholder. */
          var row = btn.closest ? btn.closest('div') : btn.parentNode;
          if (!row) return;
          var sibling = row.querySelector ? row.querySelector('input[type="text"]') : null;
          if (!sibling) return;
          var ph = sibling.getAttribute('placeholder') || '';
          var isProject = ph.indexOf('.proj') !== -1;
          var isIoDir   = ph.indexOf('IOFiles') !== -1;
          if (!isProject && !isIoDir) return;

          _browseBtnsPatched.add(btn);
          btn.addEventListener('click', function (e) {
            e.preventDefault();
            e.stopImmediatePropagation();

            var mode    = isIoDir ? 'directory' : 'file';
            var filters = isProject
              ? [{ label: 'Flownex / project files', extension: '*.proj;*.fnx;*.zip;*.json' }]
              : [];

            btn.disabled = true;
            btn.textContent = '…';

            _serverBrowse(mode, filters)
              .then(function (path) {
                btn.disabled = false;
                btn.textContent = '...';
                if (!path) return;
                _setReactInput(sibling, path);
                /* Also persist immediately */
                if (isProject) localStorage.setItem(LS_PROJECT, path);
                else            localStorage.setItem(LS_IODIR,   path);
                _showToast('\u2713 Path set: ' + path, false);
              })
              .catch(function (err) {
                btn.disabled = false;
                btn.textContent = '...';
                _showToast('\u26a0 ' + err.message + ' — paste the path manually.', true);
              });
          }, true /* capture — runs before React's onClick */);
        });
      }

      /* ── Toast helper — delegates to the shared __omniShowToast ──────── */
      function _showToast(msg, isError) {
        if (window.__omniShowToast) window.__omniShowToast(msg, isError);
      }

      /* ── MutationObserver: wire everything whenever DOM changes ─────────*/
      new MutationObserver(function () {
        _patchBridgeAPI();
        _tryRestorePaths();
        _patchBrowseButtons();
      }).observe(document.documentElement, { childList: true, subtree: true });

      /* Intercept WebSocket before the React bundle loads */
      _hookBridgeWsMessages();
    }());
    </script>

    <script src="/static/js/main.eb06dcd7.js"></script>
  </body>
</html>
